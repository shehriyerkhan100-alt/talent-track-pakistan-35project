<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now - Talent Track Pakistan</title>
    <link rel="icon" type="image/png" href="./image/talnt_trck5.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="site-container">
    <nav class="sidebar">
        <div class="menu-label">DASHBOARD</div>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="course.html">COURSES OFFER</a></li>
            <li><a href="CONTACT.HTML">CONTACT INFO</a></li>
            <li><a href="ABOUT.HTML">ABOUT US</a></li>
        </ul>
        <div class="sidebar-footer">© 2026 ICST</div>
    </nav>

    <main class="content-area">
        <header class="main-header">
            <div class="title-wrapper">
                <h1 class="brand-name">ONLINE ADMISSION</h1>
                <p class="tagline">Start Your Journey with Muntaha Academy</p>
            </div>
        </header>

        <div class="admission-form-container">
            <form action="#" class="enroll-form">
                <h3><i class="fas fa-user-edit"></i> Student Registration</h3>
                
                <div class="input-row">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label>Father's Name</label>
                        <input type="text" placeholder="Father's name" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" placeholder="03xx-xxxxxxx" required>
                    </div>
                    <div class="input-group">
                        <label>CNIC / B-Form</label>
                        <input type="text" placeholder="xxxxx-xxxxxxx-x" required>
                    </div>
                </div>

                <div class="input-group full-width">
                    <label>Select Course</label>
                    <select required>
                        <option value="">-- Choose a Course --</option>
                        <option value="web">Web Development (6 Months)</option>
                        <option value="graphic">Graphic Design (3 Months)</option>
                        <option value="marketing">Digital Marketing (3 Months)</option>
                        <option value="office">MS Office & CIT</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label>Your Address</label>
                    <textarea rows="3" placeholder="Sikanderabad, Kotri, etc."></textarea>
                </div>

                <button type="submit" class="submit-btn-large">Submit Application</button>
            </form>
        </div>
    </main>
</div>

</body>
</html>
